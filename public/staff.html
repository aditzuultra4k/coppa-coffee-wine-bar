<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coppa Staff | Programari</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="staff.css" />
  </head>
  <body class="staff-page">
    <main class="staff-shell">
      <section class="staff-login" id="loginPanel">
        <a class="brand" href="/"><span>Coppa</span><small>Coffee & Wine Bar</small></a>
        <h1>Programari staff</h1>
        <p>Acces protejat pentru echipa Coppa.</p>
        <form id="loginForm">
          <label>Parola staff<input name="password" type="password" autocomplete="current-password" required /></label>
          <button class="solid-button" type="submit">Intra in panou</button>
          <p class="form-status" id="loginStatus" role="status"></p>
        </form>
      </section>

      <section class="staff-dashboard hidden" id="dashboardPanel">
        <header class="staff-topbar">
          <div>
            <p class="eyebrow">Staff only</p>
            <h1>Programari primite</h1>
          </div>
          <button class="ghost-button" type="button" id="logoutButton">Logout</button>
        </header>
        <div class="staff-summary" id="staffSummary"></div>
        <div class="reservation-list" id="reservationList"></div>
      </section>
    </main>

    <script src="staff.js"></script>
  </body>
</html>
